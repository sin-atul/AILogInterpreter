<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LogMind — AI Log Interpreter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #06080d;
  --surface: #0d1117;
  --surface2: #161b24;
  --border: rgba(255,255,255,0.07);
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --subtle: #1e2533;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,229,255,0.06),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(124,58,237,0.05),transparent);pointer-events:none;z-index:0}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(0,229,255,0.2)}50%{box-shadow:0 0 20px rgba(0,229,255,0.5)}}

.fade-up{animation:fadeUp .4s ease both}
.fade-up-1{animation:fadeUp .4s .1s ease both}
.fade-up-2{animation:fadeUp .4s .2s ease both}
.fade-up-3{animation:fadeUp .4s .3s ease both}
.spin{animation:spin .8s linear infinite}
.pulse-dot{animation:pulse 1.4s ease-in-out infinite}
.blink{animation:blink 1s step-end infinite}
.shimmer-bg{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
.glow-anim{animation:glowPulse 2s ease-in-out infinite}

/* Grid bg */
.grid-bg{background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px}

/* Components */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(0,229,255,0.1),transparent,rgba(124,58,237,0.1));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

.btn-primary{background:linear-gradient(135deg,var(--accent),#0891b2);color:#000;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;letter-spacing:.15em;text-transform:uppercase;border:none;border-radius:10px;padding:12px 28px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,255,0.3)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}

.btn-ghost{background:transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:rgba(0,229,255,0.3);color:var(--accent);background:rgba(0,229,255,0.05)}

.tag{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:3px 10px;border-radius:4px}

textarea,select,input{font-family:'IBM Plex Mono',monospace;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;transition:all .2s;outline:none}
textarea:focus,select:focus,input:focus{border-color:rgba(0,229,255,0.4);box-shadow:0 0 0 3px rgba(0,229,255,0.08)}
textarea::placeholder{color:var(--muted)}

.section-toggle{background:transparent;border:none;width:100%;text-align:left;cursor:pointer;color:var(--text);font-family:'IBM Plex Mono',monospace;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;transition:background .2s}
.section-toggle:hover{background:rgba(255,255,255,0.02)}

/* Issue types */
.issue-error{border-left:3px solid var(--danger);background:rgba(239,68,68,0.06)}
.issue-warning{border-left:3px solid var(--warn);background:rgba(245,158,11,0.06)}
.issue-suspicious{border-left:3px solid #a855f7;background:rgba(168,85,247,0.06)}
.issue-info{border-left:3px solid var(--accent);background:rgba(0,229,255,0.06)}

/* Impact colors */
.impact-critical{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3)}
.impact-high{background:rgba(249,115,22,0.15);color:#fdba74;border:1px solid rgba(249,115,22,0.3)}
.impact-medium{background:rgba(245,158,11,0.15);color:#fcd34d;border:1px solid rgba(245,158,11,0.3)}
.impact-low{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3)}

/* Ollama status */
.status-online{color:var(--accent3)}
.status-offline{color:var(--danger)}
.status-checking{color:var(--warn)}

/* Terminal cursor */
.cursor::after{content:'█';animation:blink 1s step-end infinite;color:var(--accent);margin-left:2px}

/* Noise texture overlay */
.noise::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;border-radius:inherit}
</style>
</head>
<body class="grid-bg">
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

const MAX = 100000;
const LANGS = [
  {code:"English",label:"EN — English"},
  {code:"Hindi",label:"HI — Hindi"},
  {code:"Dutch",label:"NL — Dutch"},
  {code:"Spanish",label:"ES — Spanish"},
  {code:"German",label:"DE — German"},
  {code:"French",label:"FR — French"},
  {code:"Japanese",label:"JA — Japanese"},
  {code:"custom",label:"✎ — Custom"},
];

const MODELS = [
  "llama3","llama3.2","llama3.1","mistral","mixtral","gemma2","codellama","phi3","deepseek-r1","qwen2.5"
];

const SYSTEM = `You are a Senior DevOps Engineer, Site Reliability Engineer, and Production Support Engineer with 15+ years of experience. You analyze ALL types of logs: server, application, payment, security, CI/CD, cloud, container, database logs.

STRICT RULES:
- Never hallucinate. If uncertain, explicitly say so.
- Be beginner-friendly but technically precise.
- Respond FULLY in the language requested.
- Return ONLY a valid JSON object. No markdown, no explanation outside JSON.

JSON schema (follow exactly):
{
  "summary": "2-3 sentence overview",
  "technologiesDetected": ["array of strings"],
  "impactLevel": "Low|Medium|High|Critical",
  "impactReason": "why this level",
  "confidenceLevel": "Low|Medium|High",
  "confidenceReason": "why this confidence",
  "keyIssues": [
    {"type":"error|warning|info|suspicious","title":"string","description":"string","lineHint":"string or null"}
  ],
  "rootCause": "most likely root cause",
  "stepByStep": [{"step":1,"title":"string","detail":"string"}],
  "suggestedFixes": [{"priority":"Immediate|Short-term|Long-term","action":"string","reason":"string"}],
  "preventiveRecommendations": ["string"],
  "timeline": "reconstructed sequence or null",
  "suspiciousPatterns": ["string or empty array"]
}`;

// ── Ollama API ──────────────────────────────────────────────────────────────

async function checkOllama(host) {
  try {
    const r = await fetch(`${host}/api/tags`, {signal: AbortSignal.timeout(3000)});
    if (!r.ok) return {ok:false, models:[]};
    const d = await r.json();
    return {ok:true, models: (d.models||[]).map(m=>m.name)};
  } catch { return {ok:false, models:[]}; }
}

async function analyzeWithOllama(logs, lang, host, model) {
  const prompt = `Analyze these logs. Respond FULLY in ${lang}. Return ONLY valid JSON.\n\nLOGS:\n${logs}`;
  const res = await fetch(`${host}/api/generate`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model, prompt, system: SYSTEM, stream:false, format:"json"})
  });
  if (!res.ok) throw new Error(`Ollama error: HTTP ${res.status}. Is Ollama running?`);
  const d = await res.json();
  const raw = (d.response||"").replace(/```json|```/g,"").trim();
  try { return JSON.parse(raw); }
  catch { throw new Error("AI returned invalid JSON. Try again or use a different model."); }
}

// ── Export ──────────────────────────────────────────────────────────────────

function toText(r) {
  return [
    "LOGMIND — AI LOG ANALYSIS REPORT",
    "=".repeat(52),
    `\nSUMMARY\n${r.summary}`,
    `\nIMPACT LEVEL : ${r.impactLevel}`,
    `IMPACT REASON: ${r.impactReason}`,
    `CONFIDENCE   : ${r.confidenceLevel} — ${r.confidenceReason}`,
    `\nTECHNOLOGIES DETECTED\n${r.technologiesDetected?.join(", ")||"—"}`,
    `\nROOT CAUSE\n${r.rootCause}`,
    `\nKEY ISSUES\n${r.keyIssues?.map(i=>`  [${i.type.toUpperCase()}] ${i.title}\n  ${i.description}${i.lineHint?"\n  > "+i.lineHint:""}`).join("\n\n")||"None"}`,
    `\nSTEP-BY-STEP EXPLANATION\n${r.stepByStep?.map(s=>`  Step ${s.step}: ${s.title}\n  ${s.detail}`).join("\n\n")||"—"}`,
    `\nSUGGESTED FIXES\n${r.suggestedFixes?.map(f=>`  [${f.priority}] ${f.action}\n  ${f.reason}`).join("\n\n")||"—"}`,
    `\nPREVENTIVE RECOMMENDATIONS\n${r.preventiveRecommendations?.map(p=>`  • ${p}`).join("\n")||"—"}`,
    r.timeline ? `\nTIMELINE\n${r.timeline}` : "",
    r.suspiciousPatterns?.length ? `\nSUSPICIOUS PATTERNS\n${r.suspiciousPatterns.map(p=>`  ⚠ ${p}`).join("\n")}` : "",
    "\n" + "─".repeat(52),
    "Generated by LogMind · Powered by Ollama (local AI) · No data stored.",
  ].filter(Boolean).join("\n");
}

// ── Sub-components ──────────────────────────────────────────────────────────

function OllamaStatus({status, models, onRefresh}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:10,letterSpacing:".1em"}}>
      <span className={`pulse-dot`} style={{width:6,height:6,borderRadius:"50%",display:"inline-block",
        background: status==="online"?"#10b981":status==="offline"?"#ef4444":"#f59e0b"}}/>
      <span className={`status-${status}`} style={{textTransform:"uppercase",fontWeight:600}}>
        {status==="online"?`OLLAMA ONLINE · ${models.length} MODEL${models.length!==1?"S":""}`:
         status==="offline"?"OLLAMA OFFLINE":
         "CHECKING..."}
      </span>
      <button onClick={onRefresh} className="btn-ghost" style={{padding:"2px 8px",fontSize:9}}>↺</button>
    </div>
  );
}

function IssueCard({issue}) {
  const cfg = {
    error:  {cls:"issue-error",  icon:"✖", color:"#fca5a5", label:"ERROR"},
    warning:{cls:"issue-warning",icon:"▲", color:"#fcd34d", label:"WARN"},
    suspicious:{cls:"issue-suspicious",icon:"◈",color:"#d8b4fe",label:"SUSPECT"},
    info:   {cls:"issue-info",   icon:"◆", color:"#67e8f9", label:"INFO"},
  }[issue.type] || {cls:"issue-info",icon:"◆",color:"#67e8f9",label:"INFO"};

  return (
    <div className={cfg.cls} style={{borderRadius:8,padding:"12px 16px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{color:cfg.color,fontSize:11}}>{cfg.icon}</span>
        <span className="tag" style={{color:cfg.color,background:"transparent",border:`1px solid ${cfg.color}40`,padding:"2px 8px"}}>{cfg.label}</span>
        <span style={{fontWeight:600,fontSize:12,color:"#e2e8f0"}}>{issue.title}</span>
      </div>
      <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>{issue.description}</p>
      {issue.lineHint && (
        <code style={{display:"block",marginTop:8,fontSize:10,background:"rgba(0,0,0,0.4)",color:"#86efac",borderRadius:6,padding:"8px 12px",overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
          {issue.lineHint}
        </code>
      )}
    </div>
  );
}

function Collapsible({title, icon, defaultOpen=false, accent=false, children}) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="card" style={{marginBottom:0}}>
      <button className="section-toggle" onClick={()=>setOpen(!open)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:14}}>{icon}</span>
          <span style={{fontSize:12,fontWeight:600,letterSpacing:".08em",color: accent?"var(--accent)":"var(--text)"}}>{title}</span>
        </div>
        <span style={{color:"var(--muted)",fontSize:10,transform:open?"rotate(180deg)":"",transition:"transform .2s",display:"inline-block"}}>▼</span>
      </button>
      {open && (
        <div style={{padding:"0 20px 20px",borderTop:"1px solid var(--border)"}}>
          <div style={{paddingTop:16}}>{children}</div>
        </div>
      )}
    </div>
  );
}

function FixCard({fix}) {
  const cfg = {
    Immediate:{color:"#fca5a5",bg:"rgba(239,68,68,0.1)",border:"rgba(239,68,68,0.25)"},
    "Short-term":{color:"#fcd34d",bg:"rgba(245,158,11,0.1)",border:"rgba(245,158,11,0.25)"},
    "Long-term":{color:"#6ee7b7",bg:"rgba(16,185,129,0.1)",border:"rgba(16,185,129,0.25)"},
  }[fix.priority] || {color:"#94a3b8",bg:"rgba(148,163,184,0.1)",border:"rgba(148,163,184,0.25)"};
  return (
    <div style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:8,padding:"12px 16px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span className="tag" style={{color:cfg.color,border:`1px solid ${cfg.border}`,background:"transparent"}}>{fix.priority}</span>
        <span style={{fontSize:12,fontWeight:600}}>{fix.action}</span>
      </div>
      <p style={{fontSize:11,color:"#94a3b8"}}>{fix.reason}</p>
    </div>
  );
}

function StepItem({s}) {
  return (
    <div style={{display:"flex",gap:16,marginBottom:20}}>
      <div style={{width:28,height:28,borderRadius:"50%",border:"1px solid rgba(0,229,255,0.3)",background:"rgba(0,229,255,0.08)",color:"var(--accent)",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
        {s.step}
      </div>
      <div>
        <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0",marginBottom:4}}>{s.title}</div>
        <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.65}}>{s.detail}</div>
      </div>
    </div>
  );
}

function ConfidenceMeter({level}) {
  const map = {Low:1,Medium:2,High:3};
  const n = map[level]||1;
  return (
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      {[1,2,3].map(i=>(
        <div key={i} style={{width:20,height:4,borderRadius:2,background:i<=n?"var(--accent)":"var(--surface2)",transition:"background .3s"}}/>
      ))}
      <span style={{fontSize:10,color:"var(--muted)",marginLeft:4,letterSpacing:".1em"}}>{level?.toUpperCase()}</span>
    </div>
  );
}

function ImpactBadge({level}) {
  const cls = `impact-${(level||"low").toLowerCase()}`;
  return <span className={`tag ${cls}`} style={{borderRadius:6,padding:"4px 10px"}}>{level}</span>;
}

// ── Main App ────────────────────────────────────────────────────────────────

function App() {
  const [logs, setLogs] = useState("");
  const [lang, setLang] = useState("English");
  const [customLang, setCustomLang] = useState("");
  const [ollamaHost, setOllamaHost] = useState("http://localhost:11434");
  const [model, setModel] = useState("llama3");
  const [availableModels, setAvailableModels] = useState([]);
  const [ollamaStatus, setOllamaStatus] = useState("checking");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [charCount, setCharCount] = useState(0);
  const fileRef = useRef();

  const effLang = lang==="custom" ? customLang||"English" : lang;

  // Check Ollama on load
  const checkStatus = useCallback(async () => {
    setOllamaStatus("checking");
    const {ok, models} = await checkOllama(ollamaHost);
    setOllamaStatus(ok?"online":"offline");
    if (ok && models.length > 0) {
      setAvailableModels(models);
      setModel(models[0]);
    }
  }, [ollamaHost]);

  useEffect(()=>{ checkStatus(); }, []);

  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > MAX) { setError("File too large. Max 100KB."); return; }
    const r = new FileReader();
    r.onload = ev => { setLogs(ev.target.result); setCharCount(ev.target.result.length); };
    r.readAsText(f);
  };

  const handleAnalyze = async () => {
    if (ollamaStatus !== "online") { setError("Ollama is not running. Please start Ollama first. See setup guide below."); return; }
    if (!logs.trim()) { setError("Please paste or upload logs first."); return; }
    if (logs.length > MAX) { setError("Logs too large. Max 100KB."); return; }
    setError(""); setResult(null); setLoading(true);
    try {
      const r = await analyzeWithOllama(logs.slice(0,MAX), effLang, ollamaHost, model);
      setResult(r);
    } catch(e) {
      setError(e.message);
    } finally { setLoading(false); }
  };

  const handleCopy = () => {
    if (!result) return;
    navigator.clipboard.writeText(toText(result));
    setCopied(true); setTimeout(()=>setCopied(false),2000);
  };

  const downloadTxt = () => {
    const b = new Blob([toText(result)],{type:"text/plain"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(b); a.download="logmind-analysis.txt"; a.click();
  };

  const printPdf = () => {
    const w = window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>LogMind Analysis</title>
    <style>body{font-family:monospace;padding:2rem;max-width:860px;margin:auto;line-height:1.6}
    pre{white-space:pre-wrap;word-break:break-all;background:#f5f5f5;padding:1.5rem;border-radius:8px;font-size:13px}
    h1{font-size:1.2rem;margin-bottom:1rem;color:#1e293b}</style></head>
    <body><h1>LogMind — AI Log Analysis Report</h1><pre>${toText(result).replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre></body></html>`);
    w.document.close(); w.print();
  };

  return (
    <div style={{minHeight:"100vh",position:"relative",zIndex:1}}>

      {/* ── Header ── */}
      <header style={{borderBottom:"1px solid var(--border)",background:"rgba(6,8,13,0.85)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 20px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,var(--accent),#0891b2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,boxShadow:"0 0 16px rgba(0,229,255,0.3)"}}>
              ⬡
            </div>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,letterSpacing:"-.02em",color:"#fff"}}>
                Log<span style={{color:"var(--accent)"}}>Mind</span>
              </div>
              <div style={{fontSize:9,color:"var(--muted)",letterSpacing:".15em",textTransform:"uppercase",marginTop:-2}}>Local AI · Zero Cost · Private</div>
            </div>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <OllamaStatus status={ollamaStatus} models={availableModels} onRefresh={checkStatus}/>
            <button onClick={()=>setShowSettings(!showSettings)} className="btn-ghost" style={{padding:"6px 12px"}}>
              {showSettings?"✕ Close":"⚙ Settings"}
            </button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:960,margin:"0 auto",padding:"32px 20px 80px"}}>

        {/* ── Hero ── */}
        <div className="fade-up" style={{textAlign:"center",paddingBottom:40}}>
          <div className="tag" style={{background:"rgba(0,229,255,0.08)",border:"1px solid rgba(0,229,255,0.2)",color:"var(--accent)",marginBottom:16,display:"inline-flex"}}>
            <span className="pulse-dot" style={{width:6,height:6,borderRadius:"50%",background:"var(--accent)",display:"inline-block"}}/>
            &nbsp;Powered by Ollama · Runs 100% Locally · Free Forever
          </div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"clamp(2rem,5vw,3.2rem)",lineHeight:1.1,letterSpacing:"-.03em",marginBottom:12}}>
            <span style={{color:"#fff"}}>Understand any log.</span><br/>
            <span style={{color:"var(--accent)"}}>Instantly. Privately.</span>
          </h1>
          <p style={{color:"var(--muted)",fontSize:13,maxWidth:520,margin:"0 auto",lineHeight:1.7}}>
            Paste server, payment, security, CI/CD, or any log. Local AI explains it in plain language — no cloud, no cost, no data leaving your machine.
          </p>
        </div>

        {/* ── Settings Panel ── */}
        {showSettings && (
          <div className="card fade-up" style={{marginBottom:20,padding:20}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:".12em",color:"var(--muted)",marginBottom:16,textTransform:"uppercase"}}>⚙ Ollama Settings</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div>
                <label style={{fontSize:10,color:"var(--muted)",letterSpacing:".1em",display:"block",marginBottom:6}}>OLLAMA HOST</label>
                <input value={ollamaHost} onChange={e=>setOllamaHost(e.target.value)}
                  style={{width:"100%",padding:"9px 12px",fontSize:12,borderRadius:8}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:"var(--muted)",letterSpacing:".1em",display:"block",marginBottom:6}}>MODEL</label>
                <select value={model} onChange={e=>setModel(e.target.value)}
                  style={{width:"100%",padding:"9px 12px",fontSize:12,borderRadius:8,cursor:"pointer"}}>
                  {availableModels.length > 0
                    ? availableModels.map(m=><option key={m} value={m}>{m}</option>)
                    : MODELS.map(m=><option key={m} value={m}>{m}</option>)
                  }
                </select>
              </div>
            </div>
            <button onClick={checkStatus} className="btn-ghost" style={{marginTop:12,fontSize:11}}>↺ Test Connection</button>

            {/* Setup guide */}
            {ollamaStatus==="offline" && (
              <div style={{marginTop:16,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:10,padding:16}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--warn)",marginBottom:10,letterSpacing:".1em"}}>▲ OLLAMA NOT DETECTED — QUICK SETUP</div>
                <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.8}}>
                  <b style={{color:"#e2e8f0"}}>1.</b> Download Ollama → <a href="https://ollama.com" target="_blank" style={{color:"var(--accent)"}}>ollama.com</a><br/>
                  <b style={{color:"#e2e8f0"}}>2.</b> Install and open it (runs in background)<br/>
                  <b style={{color:"#e2e8f0"}}>3.</b> Open terminal and run: <code style={{background:"rgba(0,0,0,0.4)",padding:"1px 8px",borderRadius:4,color:"#86efac"}}>ollama pull llama3</code><br/>
                  <b style={{color:"#e2e8f0"}}>4.</b> Click ↺ Test Connection above<br/>
                  <b style={{color:"#e2e8f0"}}>5.</b> For GitHub Pages: enable CORS with <code style={{background:"rgba(0,0,0,0.4)",padding:"1px 8px",borderRadius:4,color:"#86efac"}}>OLLAMA_ORIGINS=* ollama serve</code>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── Input Card ── */}
        <div className="card fade-up-1" style={{marginBottom:16}}>
          <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,fontWeight:600,letterSpacing:".12em",color:"var(--muted)",textTransform:"uppercase"}}>// Log Input</span>
              <span className="blink" style={{color:"var(--accent)",fontSize:14}}>_</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:10,color:"var(--muted)"}}>{charCount.toLocaleString()} / {MAX.toLocaleString()}</span>
              <button onClick={()=>{setLogs("");setResult(null);setError("");setCharCount(0);}} className="btn-ghost" style={{padding:"3px 10px",fontSize:10,color:"#ef4444",borderColor:"rgba(239,68,68,0.3)"}}>CLEAR</button>
            </div>
          </div>

          <div style={{padding:20}}>
            <textarea
              value={logs}
              onChange={e=>{setLogs(e.target.value);setCharCount(e.target.value.length);}}
              placeholder={`Paste your logs here...\n\n# Supported formats:\n  Nginx · Apache · Docker · Kubernetes · Java stacktrace\n  Python traceback · Node.js · Payment gateway · Stripe\n  AWS CloudWatch · GitHub Actions · Security audit\n  PostgreSQL · MongoDB · Redis · Any custom log format`}
              rows={11}
              maxLength={MAX}
              spellCheck={false}
              style={{width:"100%",padding:"14px 16px",fontSize:11,lineHeight:1.7,resize:"vertical",borderRadius:10}}
            />

            <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:12,alignItems:"center"}}>
              <input ref={fileRef} type="file" accept=".txt,.log,.json,.xml" style={{display:"none"}} onChange={handleFile}/>
              <button onClick={()=>fileRef.current.click()} className="btn-ghost" style={{display:"flex",alignItems:"center",gap:6}}>
                <span>📁</span> Upload File
                <span style={{color:"var(--muted)",fontSize:10}}>.txt .log .json</span>
              </button>

              <select value={lang} onChange={e=>setLang(e.target.value)}
                style={{padding:"8px 12px",fontSize:11,borderRadius:8,cursor:"pointer"}}>
                {LANGS.map(l=><option key={l.code} value={l.code}>{l.label}</option>)}
              </select>

              {lang==="custom" && (
                <input value={customLang} onChange={e=>setCustomLang(e.target.value)}
                  placeholder="e.g. Japanese" style={{padding:"8px 12px",fontSize:11,borderRadius:8,width:130}}/>
              )}

              <button onClick={handleAnalyze} disabled={loading||ollamaStatus!=="online"} className="btn-primary" style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
                {loading
                  ? <><span className="spin" style={{width:12,height:12,border:"2px solid rgba(0,0,0,0.2)",borderTop:"2px solid #000",borderRadius:"50%",display:"inline-block"}}/>ANALYZING…</>
                  : <><span>▶</span> ANALYZE LOGS</>
                }
              </button>
            </div>
          </div>
        </div>

        {/* ── Error ── */}
        {error && (
          <div className="fade-up" style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#fca5a5",display:"flex",gap:8}}>
            <span>✖</span><span>{error}</span>
          </div>
        )}

        {/* ── Loading skeleton ── */}
        {loading && (
          <div className="fade-up" style={{space:"y-3"}}>
            <div style={{marginBottom:12,fontSize:11,color:"var(--accent)",letterSpacing:".15em",display:"flex",alignItems:"center",gap:8}}>
              <span className="spin" style={{width:10,height:10,border:"1.5px solid rgba(0,229,255,0.2)",borderTop:"1.5px solid var(--accent)",borderRadius:"50%",display:"inline-block"}}/>
              AI IS READING YOUR LOGS…
            </div>
            {[75,55,65,45,70].map((w,i)=>(
              <div key={i} className="shimmer-bg" style={{height:14,borderRadius:4,marginBottom:8,width:`${w}%`,opacity:.6}}/>
            ))}
          </div>
        )}

        {/* ── Results ── */}
        {result && !loading && (
          <div style={{display:"flex",flexDirection:"column",gap:12}} className="fade-up">

            {/* Summary hero */}
            <div className="card noise" style={{padding:24,background:"linear-gradient(135deg,rgba(0,229,255,0.04),rgba(124,58,237,0.04))"}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:20,justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:240}}>
                  <div style={{fontSize:9,letterSpacing:".2em",color:"var(--muted)",marginBottom:8,textTransform:"uppercase"}}>Analysis Summary</div>
                  <p style={{fontSize:13,lineHeight:1.7,color:"#e2e8f0"}}>{result.summary}</p>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"flex-end"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,color:"var(--muted)"}}>IMPACT</span>
                    <ImpactBadge level={result.impactLevel}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,color:"var(--muted)"}}>CONFIDENCE</span>
                    <ConfidenceMeter level={result.confidenceLevel}/>
                  </div>
                </div>
              </div>

              {result.technologiesDetected?.length > 0 && (
                <div style={{marginTop:16,display:"flex",flexWrap:"wrap",gap:6}}>
                  {result.technologiesDetected.map(t=>(
                    <span key={t} className="tag" style={{background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--muted)",fontSize:9}}>{t}</span>
                  ))}
                </div>
              )}
            </div>

            {/* Issues */}
            {result.keyIssues?.length > 0 && (
              <Collapsible title={`Key Issues Detected (${result.keyIssues.length})`} icon="🔍" defaultOpen accent>
                {result.keyIssues.map((issue,i)=><IssueCard key={i} issue={issue}/>)}
              </Collapsible>
            )}

            {/* Root Cause */}
            <Collapsible title="Root Cause Analysis" icon="🎯" defaultOpen>
              <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.7,marginBottom:8}}>{result.rootCause}</p>
              <p style={{fontSize:10,color:"var(--muted)",fontStyle:"italic"}}>{result.impactReason}</p>
            </Collapsible>

            {/* Step by Step */}
            {result.stepByStep?.length > 0 && (
              <Collapsible title="Step-by-Step Explanation" icon="📖" defaultOpen>
                {result.stepByStep.map(s=><StepItem key={s.step} s={s}/>)}
              </Collapsible>
            )}

            {/* Fixes */}
            {result.suggestedFixes?.length > 0 && (
              <Collapsible title="Suggested Fixes" icon="🔧">
                {result.suggestedFixes.map((f,i)=><FixCard key={i} fix={f}/>)}
              </Collapsible>
            )}

            {/* Prevention */}
            {result.preventiveRecommendations?.length > 0 && (
              <Collapsible title="Preventive Recommendations" icon="🛡">
                <ul style={{listStyle:"none",paddingLeft:0}}>
                  {result.preventiveRecommendations.map((p,i)=>(
                    <li key={i} style={{display:"flex",gap:10,fontSize:12,color:"#94a3b8",marginBottom:10,lineHeight:1.6}}>
                      <span style={{color:"var(--accent3)",flexShrink:0}}>✓</span>{p}
                    </li>
                  ))}
                </ul>
              </Collapsible>
            )}

            {/* Timeline */}
            {result.timeline && (
              <Collapsible title="Timeline Reconstruction" icon="⏱">
                <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{result.timeline}</p>
              </Collapsible>
            )}

            {/* Suspicious */}
            {result.suspiciousPatterns?.length > 0 && (
              <Collapsible title={`Suspicious Patterns (${result.suspiciousPatterns.length})`} icon="🚨">
                {result.suspiciousPatterns.map((p,i)=>(
                  <div key={i} style={{display:"flex",gap:8,fontSize:12,color:"#d8b4fe",marginBottom:8,padding:"8px 12px",background:"rgba(168,85,247,0.08)",borderRadius:6,border:"1px solid rgba(168,85,247,0.2)"}}>
                    <span style={{flexShrink:0}}>⚠</span>{p}
                  </div>
                ))}
              </Collapsible>
            )}

            {/* Export */}
            <div className="card" style={{padding:20}}>
              <div style={{fontSize:10,letterSpacing:".15em",color:"var(--muted)",marginBottom:14,textTransform:"uppercase"}}>Export Analysis</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                <button onClick={downloadTxt} className="btn-ghost" style={{display:"flex",alignItems:"center",gap:6}}>
                  <span>📄</span> Download TXT
                </button>
                <button onClick={printPdf} className="btn-ghost" style={{display:"flex",alignItems:"center",gap:6}}>
                  <span>🖨</span> Print / PDF
                </button>
                <button onClick={handleCopy} className="btn-ghost" style={{
                  display:"flex",alignItems:"center",gap:6,
                  ...(copied?{borderColor:"rgba(16,185,129,0.4)",color:"var(--accent3)",background:"rgba(16,185,129,0.08)"}:{})
                }}>
                  <span>{copied?"✓":"📋"}</span> {copied?"Copied!":"Copy to Clipboard"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── How it works (empty state) ── */}
        {!result && !loading && (
          <div className="fade-up-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,marginTop:8}}>
            {[
              {icon:"🔒",title:"100% Private",desc:"Logs never leave your machine. AI runs locally via Ollama."},
              {icon:"⚡",title:"Zero Cost",desc:"No API keys, no subscriptions, no limits. Free forever."},
              {icon:"🌐",title:"Any Log Format",desc:"Nginx, Docker, Stripe, AWS, Java, Python, K8s and more."},
              {icon:"🌍",title:"Multi-language",desc:"Get analysis in English, Hindi, Spanish, German and more."},
            ].map(c=>(
              <div key={c.title} className="card" style={{padding:20,textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:10}}>{c.icon}</div>
                <div style={{fontSize:12,fontWeight:600,marginBottom:6,color:"#e2e8f0"}}>{c.title}</div>
                <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.6}}>{c.desc}</div>
              </div>
            ))}
          </div>
        )}
      </main>

      {/* ── Footer ── */}
      <footer style={{borderTop:"1px solid var(--border)",padding:"20px",textAlign:"center",background:"rgba(6,8,13,0.6)"}}>
        <p style={{fontSize:11,color:"var(--accent3)",fontWeight:600,marginBottom:4}}>
          🔒 No logs stored. No data sent to cloud. Everything runs on your local machine.
        </p>
        <p style={{fontSize:10,color:"var(--muted)"}}>
          LogMind · Powered by Ollama · Open Source · GitHub Ready
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
