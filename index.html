<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Log Interpreter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .shimmer{background:linear-gradient(90deg,#1e2530 25%,#262d3a 50%,#1e2530 75%);background-size:200% 100%;animation:sh 1.5s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .pulse{animation:p 1.2s ease-in-out infinite}
  @keyframes p{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const MAX = 100000;
const LANGS = [
  {code:"English",label:"🇬🇧 English"},
  {code:"Hindi",label:"🇮🇳 Hindi"},
  {code:"Dutch",label:"🇳🇱 Dutch"},
  {code:"Spanish",label:"🇪🇸 Spanish"},
  {code:"German",label:"🇩🇪 German"},
  {code:"French",label:"🇫🇷 French"},
  {code:"custom",label:"✏️ Custom…"},
];

const SYSTEM = `You are a Senior DevOps Engineer and SRE with 15+ years experience analyzing logs.
RULES:
- Never hallucinate. If uncertain, say so.
- Be beginner-friendly.
- Respond fully in the language the user requests.
- Return ONLY valid JSON, no markdown fences, matching this exact schema:
{
  "summary": "string",
  "technologiesDetected": ["string"],
  "impactLevel": "Low|Medium|High|Critical",
  "impactReason": "string",
  "confidenceLevel": "Low|Medium|High",
  "confidenceReason": "string",
  "keyIssues": [{"type":"error|warning|info|suspicious","title":"string","description":"string","lineHint":"string or null"}],
  "rootCause": "string",
  "stepByStep": [{"step":1,"title":"string","detail":"string"}],
  "suggestedFixes": [{"priority":"Immediate|Short-term|Long-term","action":"string","reason":"string"}],
  "preventiveRecommendations": ["string"],
  "timeline": "string or null",
  "suspiciousPatterns": ["string"]
}`;

async function analyze(logs, lang) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: SYSTEM,
      messages: [{role:"user", content:`Analyze these logs and respond fully in ${lang}. Return only JSON.\n\nLOGS:\n${logs}`}]
    })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || `HTTP ${res.status}`); }
  const data = await res.json();
  const raw = data.content.map(b=>b.text||"").join("");
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

function toText(r) {
  return [
    "AI LOG INTERPRETER — Analysis Report",
    "=".repeat(50),
    `\nSUMMARY\n${r.summary}`,
    `\nIMPACT: ${r.impactLevel} — ${r.impactReason}`,
    `CONFIDENCE: ${r.confidenceLevel} — ${r.confidenceReason}`,
    `\nTECHNOLOGIES: ${r.technologiesDetected?.join(", ")}`,
    `\nROOT CAUSE\n${r.rootCause}`,
    `\nKEY ISSUES:\n${r.keyIssues?.map(i=>`  [${i.type.toUpperCase()}] ${i.title}\n  ${i.description}`).join("\n")}`,
    `\nSTEPS:\n${r.stepByStep?.map(s=>`  ${s.step}. ${s.title}\n  ${s.detail}`).join("\n")}`,
    `\nFIXES:\n${r.suggestedFixes?.map(f=>`  [${f.priority}] ${f.action}`).join("\n")}`,
    `\nPREVENTION:\n${r.preventiveRecommendations?.map(p=>`  • ${p}`).join("\n")}`,
    r.timeline ? `\nTIMELINE\n${r.timeline}` : "",
    r.suspiciousPatterns?.length ? `\nSUSPICIOUS:\n${r.suspiciousPatterns.map(p=>`  ⚠ ${p}`).join("\n")}` : "",
    "\n" + "─".repeat(50),
    "No data was stored. Generated by AI Log Interpreter.",
  ].join("\n");
}

const ImpactBadge = ({level}) => {
  const c = {Critical:"bg-red-600 text-white",High:"bg-orange-500 text-white",Medium:"bg-yellow-500 text-black",Low:"bg-emerald-500 text-white"};
  return <span className={`px-2 py-0.5 rounded text-xs font-bold uppercase tracking-widest ${c[level]||"bg-gray-500 text-white"}`}>{level}</span>;
};

const Dots = ({level}) => {
  const m = {Low:1,Medium:2,High:3};
  return <span className="flex gap-1 items-center">
    {[1,2,3].map(i=><span key={i} className={`w-2.5 h-2.5 rounded-full ${i<=(m[level]||1)?"bg-cyan-400":"bg-gray-600"}`}/>)}
    <span className="text-xs text-gray-400 ml-1">{level}</span>
  </span>;
};

const IssueCard = ({issue}) => {
  const s = {
    error:{border:"border-red-500/60",icon:"🔴",bg:"bg-red-900/20",tag:"text-red-400"},
    warning:{border:"border-yellow-500/60",icon:"🟡",bg:"bg-yellow-900/20",tag:"text-yellow-400"},
    suspicious:{border:"border-purple-500/60",icon:"🟣",bg:"bg-purple-900/20",tag:"text-purple-400"},
    info:{border:"border-cyan-500/60",icon:"🔵",bg:"bg-cyan-900/20",tag:"text-cyan-400"},
  }[issue.type] || {border:"border-gray-500/60",icon:"⚪",bg:"bg-gray-900/20",tag:"text-gray-400"};
  return <div className={`rounded-lg border ${s.border} ${s.bg} p-4 space-y-2`}>
    <div className="flex items-center gap-2">
      <span>{s.icon}</span>
      <span className={`text-xs font-bold uppercase tracking-widest ${s.tag}`}>{issue.type}</span>
      <span className="font-semibold text-white text-sm">{issue.title}</span>
    </div>
    <p className="text-gray-300 text-sm leading-relaxed">{issue.description}</p>
    {issue.lineHint && <code className="block text-xs bg-black/40 text-green-300 rounded px-3 py-2 font-mono overflow-x-auto whitespace-pre-wrap break-all">{issue.lineHint}</code>}
  </div>;
};

const Section = ({title, defaultOpen=false, children}) => {
  const [open, setOpen] = React.useState(defaultOpen);
  return <div className="rounded-xl border border-white/10 bg-white/5 overflow-hidden">
    <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between px-5 py-4 text-left hover:bg-white/5 transition-colors">
      <span className="font-semibold text-white text-sm tracking-wide">{title}</span>
      <span className="text-gray-400 text-lg transition-transform duration-200" style={{transform:open?"rotate(180deg)":""}}> ⌄</span>
    </button>
    {open && <div className="px-5 pb-5 border-t border-white/10 pt-4">{children}</div>}
  </div>;
};

function App() {
  const [dark, setDark] = React.useState(true);
  const [logs, setLogs] = React.useState("");
  const [lang, setLang] = React.useState("English");
  const [customLang, setCustomLang] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState("");
  const [copied, setCopied] = React.useState(false);
  const [apiKey, setApiKey] = React.useState(()=> localStorage.getItem("aik") || "");
  const [showKey, setShowKey] = React.useState(false);
  const fileRef = React.useRef();

  const effLang = lang === "custom" ? customLang || "English" : lang;

  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > MAX) { setError("File too large. Max 100KB."); return; }
    const r = new FileReader();
    r.onload = ev => setLogs(ev.target.result);
    r.readAsText(f);
  };

  const handleAnalyze = async () => {
    if (!apiKey.trim()) { setError("Please enter your Anthropic API key above."); return; }
    if (!logs.trim()) { setError("Please paste or upload logs first."); return; }
    if (logs.length > MAX) { setError("Log too large. Max 100KB."); return; }
    setError(""); setResult(null); setLoading(true);
    try {
      const r = await analyze(logs.slice(0, MAX), effLang);
      setResult(r);
    } catch(e) {
      setError("Analysis failed: " + e.message);
    } finally { setLoading(false); }
  };

  const handleCopy = () => {
    if (!result) return;
    navigator.clipboard.writeText(toText(result));
    setCopied(true); setTimeout(()=>setCopied(false), 2000);
  };

  const downloadTxt = () => {
    const blob = new Blob([toText(result)], {type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "log-analysis.txt"; a.click();
  };

  const printPdf = () => {
    const w = window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>Log Analysis</title>
    <style>body{font-family:monospace;padding:2rem;max-width:800px;margin:auto}pre{white-space:pre-wrap;word-break:break-all;background:#f5f5f5;padding:1rem;border-radius:4px}</style>
    </head><body><pre>${toText(result).replace(/</g,"&lt;")}</pre></body></html>`);
    w.document.close(); w.print();
  };

  const bg = dark ? "bg-[#0c0f14]" : "bg-[#f4f6f9]";
  const tx = dark ? "text-gray-100" : "text-gray-900";
  const card = dark ? "bg-[#141820] border-white/10" : "bg-white border-gray-200";
  const inp = dark ? "bg-[#0a0d12] border-white/10 text-gray-100 placeholder-gray-600" : "bg-white border-gray-300 text-gray-900 placeholder-gray-400";

  return <div className={`min-h-screen ${bg} ${tx} transition-colors duration-300`}>

    {/* Header */}
    <header className={`sticky top-0 z-50 border-b ${dark?"border-white/10 bg-[#0c0f14]/90":"border-gray-200 bg-white/90"} backdrop-blur-md`}>
      <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-cyan-500/20 border border-cyan-500/40 flex items-center justify-center">📋</div>
          <div>
            <div className="font-bold text-sm tracking-widest uppercase text-cyan-400">AI Log Interpreter</div>
            <div className="text-[10px] text-gray-500 tracking-wider">POWERED BY CLAUDE AI</div>
          </div>
        </div>
        <div className="flex items-center gap-3">
          <span className="hidden sm:flex items-center gap-1.5 text-[10px] text-emerald-400 border border-emerald-500/30 bg-emerald-500/10 rounded-full px-3 py-1">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse"/>NO DATA STORED
          </span>
          <button onClick={()=>setDark(!dark)} className={`w-9 h-9 rounded-lg border ${dark?"border-white/10 bg-white/5":"border-gray-200 bg-gray-50"} flex items-center justify-center transition-colors`}>
            {dark?"☀️":"🌙"}
          </button>
        </div>
      </div>
    </header>

    <main className="max-w-4xl mx-auto px-4 py-8 space-y-5">

      {/* Hero */}
      <div className="text-center py-4">
        <h1 className="text-3xl font-bold tracking-tight">
          <span className="text-cyan-400">Decode</span> your logs.<br/>
          <span className={dark?"text-gray-400":"text-gray-500"}>No expertise required.</span>
        </h1>
        <p className={`mt-2 text-sm ${dark?"text-gray-500":"text-gray-400"}`}>Paste any log — server, container, CI/CD, cloud, payment, security — get a clear AI analysis.</p>
      </div>

      {/* API Key */}
      <div className={`rounded-2xl border ${card} p-5 space-y-3`}>
        <div className="flex items-center justify-between">
          <label className="text-xs font-bold uppercase tracking-widest text-gray-400">🔑 Anthropic API Key</label>
          <a href="https://console.anthropic.com" target="_blank" className="text-[10px] text-cyan-400 hover:underline">Get free key →</a>
        </div>
        <div className="flex gap-2">
          <input
            type={showKey?"text":"password"}
            value={apiKey}
            onChange={e=>{ setApiKey(e.target.value); localStorage.setItem("aik", e.target.value); }}
            placeholder="sk-ant-..."
            className={`flex-1 rounded-lg border ${inp} px-3 py-2 text-xs focus:border-cyan-500/60 focus:ring-1 focus:ring-cyan-500/30 transition-colors`}
          />
          <button onClick={()=>setShowKey(!showKey)} className={`px-3 py-2 rounded-lg border text-xs ${dark?"border-white/10 bg-white/5 hover:bg-white/10 text-gray-400":"border-gray-200 bg-gray-50 text-gray-600"} transition-colors`}>
            {showKey?"🙈":"👁"}
          </button>
        </div>
        <p className="text-[10px] text-gray-500">🔒 Your API key is used only in your browser. Never stored or sent anywhere else.</p>
      </div>

      {/* Log Input */}
      <div className={`rounded-2xl border ${card} p-5 space-y-4`}>
        <div className="flex items-center justify-between">
          <label className="text-xs font-bold uppercase tracking-widest text-gray-400">Log Input</label>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-gray-500">{logs.length}/{MAX.toLocaleString()} chars</span>
            <button onClick={()=>{setLogs("");setResult(null);setError("");}} className="text-[10px] text-red-400 hover:text-red-300 border border-red-500/30 rounded px-2 py-0.5 transition-colors">CLEAR</button>
          </div>
        </div>

        <textarea
          value={logs}
          onChange={e=>setLogs(e.target.value)}
          placeholder={`Paste your logs here...\n\nSupports: Nginx · Docker · Kubernetes · Java · Python · Node.js\nAWS · Azure · GCP · CI/CD · Payment · Security logs`}
          rows={10}
          maxLength={MAX}
          className={`w-full rounded-xl border ${inp} p-4 text-xs leading-relaxed resize-y focus:border-cyan-500/60 focus:ring-1 focus:ring-cyan-500/30 transition-colors`}
          spellCheck={false}
        />

        <div className="flex flex-wrap gap-3 items-end">
          <div>
            <input ref={fileRef} type="file" accept=".txt,.log,.json,.xml" className="hidden" onChange={handleFile}/>
            <button onClick={()=>fileRef.current.click()} className={`flex items-center gap-2 px-4 py-2 rounded-lg border text-xs font-semibold ${dark?"border-white/10 bg-white/5 hover:bg-white/10 text-gray-300":"border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-700"} transition-colors`}>
              📁 Upload File <span className="text-gray-500 font-normal">.txt .log .json</span>
            </button>
          </div>

          <div className="flex items-center gap-2 flex-wrap">
            <select value={lang} onChange={e=>setLang(e.target.value)} className={`rounded-lg border ${inp} px-3 py-2 text-xs focus:border-cyan-500/60 cursor-pointer`}>
              {LANGS.map(l=><option key={l.code} value={l.code}>{l.label}</option>)}
            </select>
            {lang==="custom" && <input value={customLang} onChange={e=>setCustomLang(e.target.value)} placeholder="e.g. Japanese" className={`rounded-lg border ${inp} px-3 py-2 text-xs focus:border-cyan-500/60 w-32`}/>}
          </div>

          <button onClick={handleAnalyze} disabled={loading} className="ml-auto flex items-center gap-2 px-6 py-2 rounded-lg bg-cyan-500 hover:bg-cyan-400 disabled:bg-cyan-900 disabled:cursor-not-allowed text-black font-bold text-xs uppercase tracking-widest transition-colors">
            {loading ? <><span className="w-3 h-3 border-2 border-black/30 border-t-black rounded-full spin"/>Analyzing…</> : "▶ Analyze Logs"}
          </button>
        </div>
      </div>

      {/* Error */}
      {error && <div className="rounded-xl border border-red-500/50 bg-red-900/20 px-5 py-3 text-sm text-red-300">⚠ {error}</div>}

      {/* Loading */}
      {loading && <div className="space-y-3">
        {[80,60,70,50].map((w,i)=><div key={i} className="shimmer h-8 rounded-lg" style={{width:`${w}%`}}/>)}
      </div>}

      {/* Results */}
      {result && !loading && <div className="space-y-4">

        {/* Summary card */}
        <div className={`rounded-2xl border ${card} p-5`}>
          <div className="flex flex-wrap gap-4 items-start justify-between">
            <div>
              <div className="text-xs text-gray-400 uppercase tracking-widest mb-1">Summary</div>
              <p className="text-sm leading-relaxed max-w-2xl">{result.summary}</p>
            </div>
            <div className="flex flex-col gap-2 items-end shrink-0">
              <div className="flex items-center gap-2"><span className="text-xs text-gray-500">Impact</span><ImpactBadge level={result.impactLevel}/></div>
              <div className="flex items-center gap-2"><span className="text-xs text-gray-500">Confidence</span><Dots level={result.confidenceLevel}/></div>
            </div>
          </div>
          {result.technologiesDetected?.length > 0 && <div className="mt-4 flex flex-wrap gap-2">
            {result.technologiesDetected.map(t=><span key={t} className={`text-[10px] px-2 py-0.5 rounded border ${dark?"border-white/10 bg-white/5 text-gray-300":"border-gray-200 bg-gray-50 text-gray-600"} uppercase tracking-widest`}>{t}</span>)}
          </div>}
        </div>

        {result.keyIssues?.length > 0 && <Section title={`🔍 Key Issues (${result.keyIssues.length})`} defaultOpen>
          <div className="space-y-3">{result.keyIssues.map((issue,i)=><IssueCard key={i} issue={issue}/>)}</div>
        </Section>}

        <Section title="🎯 Root Cause Analysis" defaultOpen>
          <p className="text-sm text-gray-300 leading-relaxed">{result.rootCause}</p>
          <p className="text-[10px] text-gray-500 mt-2">{result.impactReason}</p>
        </Section>

        {result.stepByStep?.length > 0 && <Section title="📖 Step-by-Step Explanation" defaultOpen>
          <div className="space-y-4">{result.stepByStep.map(s=><div key={s.step} className="flex gap-4">
            <div className="w-7 h-7 rounded-full border border-cyan-500/40 bg-cyan-500/10 text-cyan-400 text-xs font-bold flex items-center justify-center shrink-0 mt-0.5">{s.step}</div>
            <div><div className="text-sm font-semibold text-white mb-1">{s.title}</div><div className="text-sm text-gray-400 leading-relaxed">{s.detail}</div></div>
          </div>)}</div>
        </Section>}

        {result.suggestedFixes?.length > 0 && <Section title="🔧 Suggested Fixes">
          <div className="space-y-3">{result.suggestedFixes.map((f,i)=>{
            const pc = f.priority==="Immediate"?"text-red-400 border-red-500/40 bg-red-900/20":f.priority==="Short-term"?"text-yellow-400 border-yellow-500/40 bg-yellow-900/20":"text-emerald-400 border-emerald-500/40 bg-emerald-900/20";
            return <div key={i} className={`rounded-lg border ${dark?"border-white/10 bg-white/5":"border-gray-100 bg-gray-50"} p-4`}>
              <div className="flex items-center gap-2 mb-1">
                <span className={`text-[10px] font-bold uppercase tracking-widest border rounded px-1.5 py-0.5 ${pc}`}>{f.priority}</span>
                <span className="text-sm font-semibold">{f.action}</span>
              </div>
              <p className="text-xs text-gray-400">{f.reason}</p>
            </div>;
          })}</div>
        </Section>}

        {result.preventiveRecommendations?.length > 0 && <Section title="🛡 Preventive Recommendations">
          <ul className="space-y-2">{result.preventiveRecommendations.map((p,i)=><li key={i} className="flex gap-2 text-sm text-gray-300"><span className="text-emerald-400 shrink-0">✓</span>{p}</li>)}</ul>
        </Section>}

        {result.timeline && <Section title="⏱ Timeline Reconstruction">
          <p className="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">{result.timeline}</p>
        </Section>}

        {result.suspiciousPatterns?.length > 0 && <Section title={`🚨 Suspicious Patterns (${result.suspiciousPatterns.length})`}>
          <ul className="space-y-2">{result.suspiciousPatterns.map((p,i)=><li key={i} className="flex gap-2 text-sm text-purple-300"><span className="shrink-0">⚠</span>{p}</li>)}</ul>
        </Section>}

        {/* Export */}
        <div className={`rounded-2xl border ${card} p-5`}>
          <div className="text-xs text-gray-400 uppercase tracking-widest mb-3">Export Analysis</div>
          <div className="flex flex-wrap gap-3">
            <button onClick={downloadTxt} className={`flex items-center gap-2 px-4 py-2 rounded-lg border text-xs font-semibold ${dark?"border-white/10 bg-white/5 hover:bg-white/10 text-gray-300":"border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-700"} transition-colors`}>📄 Download TXT</button>
            <button onClick={printPdf} className={`flex items-center gap-2 px-4 py-2 rounded-lg border text-xs font-semibold ${dark?"border-white/10 bg-white/5 hover:bg-white/10 text-gray-300":"border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-700"} transition-colors`}>🖨 Print / PDF</button>
            <button onClick={handleCopy} className={`flex items-center gap-2 px-4 py-2 rounded-lg border text-xs font-semibold ${copied?"border-emerald-500/50 bg-emerald-900/20 text-emerald-400":dark?"border-white/10 bg-white/5 hover:bg-white/10 text-gray-300":"border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-700"} transition-colors`}>
              {copied?"✓ Copied!":"📋 Copy to Clipboard"}
            </button>
          </div>
        </div>
      </div>}
    </main>

    <footer className={`mt-12 border-t ${dark?"border-white/10":"border-gray-200"} py-6`}>
      <div className="max-w-4xl mx-auto px-4 text-center space-y-1">
        <p className="text-xs text-emerald-400 font-semibold">🔒 No logs are stored. Analysis happens per request. Your data never leaves your browser.</p>
        <p className="text-[10px] text-gray-600">AI Log Interpreter · Powered by Claude AI · Open Source</p>
      </div>
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
